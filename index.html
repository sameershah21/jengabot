<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>JengaBot — Pitch Deck</title>
<style>
  :root { --ink:#2A1F1A; --cream:#F5EBDC; --accent:#D94B3E; --wood:#C8965E; --muted:#8A7B6E; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--ink); color:var(--cream);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; min-height:100%; }
  header { position:fixed; top:0; left:0; right:0; padding:14px 22px; display:flex;
           justify-content:space-between; align-items:center; z-index:10;
           background: linear-gradient(to bottom, rgba(42,31,26,0.92), rgba(42,31,26,0)); }
  header .brand { font-weight:800; letter-spacing:0.04em; }
  header .brand span { color: var(--accent); }
  header .meta { color: var(--wood); font-size: 13px; letter-spacing:0.08em; text-transform:uppercase; }
  .stage { display:flex; flex-direction:column; align-items:center; justify-content:center;
           min-height:100vh; padding: 72px 18px 90px; }
  .slide { max-width: 1200px; width: 100%; aspect-ratio: 16/9;
           background:#000; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
           overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .slide img { width: 100%; height: 100%; object-fit: contain; display:block; }
  nav.bar { position:fixed; bottom:0; left:0; right:0; padding:14px 22px;
            display:flex; align-items:center; justify-content:center; gap: 14px; z-index:10;
            background: linear-gradient(to top, rgba(42,31,26,0.92), rgba(42,31,26,0)); }
  button { background: var(--accent); border:0; color:#fff; padding: 10px 16px;
           border-radius: 6px; font-weight:700; cursor:pointer; font-size:14px; letter-spacing:.04em; }
  button:disabled { opacity:.35; cursor: not-allowed; }
  .counter { color: var(--wood); font-variant-numeric: tabular-nums; min-width: 64px; text-align:center; font-size:13px; letter-spacing:.06em; }
  .dots { display:flex; gap:6px; margin-left: 6px; }
  .dot { width:8px; height:8px; border-radius:50%; background: var(--muted); border:0; padding:0; cursor:pointer; }
  .dot.active { background: var(--accent); transform: scale(1.4); }
  a.download { color: var(--wood); text-decoration:none; border-bottom: 1px dotted var(--wood); font-size:13px; }
  @media (max-width: 640px) {
    .stage { padding: 64px 8px 80px; }
    header .meta { display:none; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">Jenga<span>Bot</span></div>
  <div class="meta">Sameer · Volk · Bruce · Jonathan</div>
</header>

<div class="stage">
  <div class="slide"><img id="slide" alt="Slide 1" src="slides/slide-01.png" /></div>
</div>

<nav class="bar">
  <button id="prev">‹ Prev</button>
  <div class="counter"><span id="cur">1</span> / <span id="total">9</span></div>
  <button id="next">Next ›</button>
  <div class="dots" id="dots"></div>
  <a class="download" href="JengaBot_Pitch.pdf" style="margin-left:18px;">Download PDF</a>
</nav>

<script>
  const TOTAL = 9;
  let idx = 1;
  const img = document.getElementById('slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const dots = document.getElementById('dots');
  total.textContent = TOTAL;

  for (let i = 1; i <= TOTAL; i++) {
    const b = document.createElement('button');
    b.className = 'dot' + (i === 1 ? ' active' : '');
    b.setAttribute('aria-label', 'Go to slide ' + i);
    b.addEventListener('click', () => go(i));
    dots.appendChild(b);
  }

  function go(n) {
    idx = Math.max(1, Math.min(TOTAL, n));
    const num = String(idx).padStart(2, '0');
    img.src = 'slides/slide-' + num + '.png';
    img.alt = 'Slide ' + idx;
    cur.textContent = idx;
    prev.disabled = (idx === 1);
    next.disabled = (idx === TOTAL);
    [...dots.children].forEach((d, i) => d.classList.toggle('active', i + 1 === idx));
    history.replaceState(null, '', '#' + idx);
  }
  prev.addEventListener('click', () => go(idx - 1));
  next.addEventListener('click', () => go(idx + 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { go(idx + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { go(idx - 1); }
    else if (e.key === 'Home') { go(1); }
    else if (e.key === 'End') { go(TOTAL); }
  });

  const hash = parseInt(location.hash.replace('#',''), 10);
  if (!isNaN(hash)) go(hash); else go(1);
</script>
</body>
</html>
